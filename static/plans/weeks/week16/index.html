<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Week 16</title>
  <meta name="description" content="Week 16 dinner and training overview">
  <link rel="icon" type="image/jpeg" href="../../assets/puran_blog_avator.jpg">
  <link rel="apple-touch-icon" href="../../assets/puran_blog_avator.jpg">
  <style>
    :root {
      color-scheme: light;
      --page-background: #f2efe8;
      --card-background: rgba(255, 255, 255, 0.84);
      --card-border: rgba(164, 150, 126, 0.24);
      --heading-color: #24303b;
      --muted-color: #667281;
      --accent-green: #0f6e56;
      --accent-indigo: #3c3489;
      --shadow-soft: 0 24px 55px rgba(38, 33, 24, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--heading-color);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 28%),
        linear-gradient(180deg, #f7f3eb 0%, #ecf1f4 100%);
    }

    .page {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero,
    .card {
      border-radius: 26px;
      border: 1px solid var(--card-border);
      background: var(--card-background);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 22px;
      margin-bottom: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      margin-bottom: 14px;
      color: var(--muted-color);
      text-decoration: none;
      font-size: 13px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 42px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .hero-copy {
      margin: 10px 0 0;
      max-width: 38rem;
      color: var(--muted-color);
      font-size: 15px;
      line-height: 1.6;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(36, 48, 59, 0.08);
      color: var(--muted-color);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .card {
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: var(--muted-color);
      line-height: 1.6;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(36, 48, 59, 0.1);
      color: var(--heading-color);
      background: rgba(255, 255, 255, 0.78);
    }

    .button.green {
      background: rgba(15, 110, 86, 0.1);
      color: var(--accent-green);
      border-color: rgba(15, 110, 86, 0.12);
    }

    .button.indigo {
      background: rgba(60, 52, 137, 0.1);
      color: var(--accent-indigo);
      border-color: rgba(60, 52, 137, 0.12);
    }

    .muted {
      opacity: 0.84;
    }

    @media (max-width: 720px) {
      .page { padding: 14px 12px 28px; }
      .hero, .card { border-radius: 22px; }
      .hero, .card { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <a class="back-link" href="../../index.html">← Plans Home</a>
      <div class="hero-kicker">Week 16</div>
      <h1>Week 16</h1>
      <p class="hero-copy">先进入这一周，再决定是看训练还是晚餐。历史 detail 页面继续保留，新的周入口也更适合手机上快速浏览。</p>
    </section>

    <section class="grid" aria-label="Week sections">
      <article class="card dinner">
        <h2>Dinner</h2>
        <p>查看本周晚餐安排，饭前快速打开就行。</p>
        <div class="actions">
          <a class="button green" href="./dinner.html">Open dinner</a>
        </div>
      </article>
      <article class="card training">
        <h2>Training</h2>
        <p>查看本周训练安排，去健身房前直接打开即可。</p>
        <div class="actions">
          <a class="button indigo" href="./training.html">Open training</a>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
