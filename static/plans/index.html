<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Plans</title>
  <meta name="description" content="Shareable dinner and training plans, optimized for quick mobile viewing.">
  <style>
    :root {
      color-scheme: light;
      --page-background: #f4f1ea;
      --card-background: rgba(255, 255, 255, 0.84);
      --card-border: rgba(164, 150, 126, 0.24);
      --heading-color: #24303b;
      --muted-color: #667281;
      --accent-green: #0f6e56;
      --accent-indigo: #3c3489;
      --shadow-soft: 0 24px 55px rgba(38, 33, 24, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--heading-color);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 28%),
        linear-gradient(180deg, #f7f3eb 0%, #eef2f5 100%);
    }

    .page {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero,
    .card {
      border-radius: 26px;
      border: 1px solid var(--card-border);
      background: var(--card-background);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 22px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(36, 48, 59, 0.08);
      color: var(--muted-color);
      font-size: 13px;
      font-weight: 600;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(36, 48, 59, 0.08);
      color: var(--muted-color);
      font-size: 13px;
      font-weight: 600;
    }

    .hero-kicker {
      margin: 14px 0 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a6e5e;
    }

    .hero-copy {
      margin: 8px 0 0;
      max-width: 36rem;
      color: var(--muted-color);
      font-size: 15px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-bottom: 18px;
    }

    .card {
      padding: 18px;
    }

    .card h2,
    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: var(--muted-color);
      line-height: 1.6;
      font-size: 14px;
    }

    .actions,
    .week-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(36, 48, 59, 0.1);
      color: var(--heading-color);
      background: rgba(255, 255, 255, 0.78);
    }

    .button.green {
      background: rgba(15, 110, 86, 0.1);
      color: var(--accent-green);
      border-color: rgba(15, 110, 86, 0.12);
    }

    .button.indigo {
      background: rgba(60, 52, 137, 0.1);
      color: var(--accent-indigo);
      border-color: rgba(60, 52, 137, 0.12);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .archive-list {
      margin-top: 12px;
    }

    .week-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 0;
      border-top: 1px solid rgba(36, 48, 59, 0.08);
    }

    .week-copy {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .week-copy strong {
      font-size: 18px;
    }

    .week-copy span {
      color: var(--muted-color);
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .page { padding: 14px 12px 28px; }
      .hero, .card { border-radius: 22px; }
      .hero { padding: 16px; }
      .card { padding: 16px; }
      .hero-top { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div>
          <span class="hero-label">Weekly Plans</span>
          <p class="hero-kicker">Latest first, archive below</p>
          <h1>Dinner + Training</h1>
          <p class="hero-copy">先看本周，再继续翻历史周。首页像目录页一样清楚，但依旧能一键直达最新内容。</p>
        </div>
        <div class="eyebrow">Archive</div>
      </div>
    </section>

    <section class="grid" aria-label="Latest links">
      <article class="card">
        <h2>Latest Dinner</h2>
        <p>优先查看当前周的晚餐安排，适合饭前快速打开。</p>
        <div class="actions">
          <a class="button green" href="./latest/dinner.html">Open latest dinner</a>
        </div>
      </article>
      <article class="card">
        <h2>Latest Training</h2>
        <p>优先查看当前周的训练安排，去健身房前直接打开就行。</p>
        <div class="actions">
          <a class="button indigo" href="./latest/training.html">Open latest training</a>
        </div>
      </article>
    </section>

    <section class="card" aria-label="Weeks archive">
      <h2 class="section-title">Weeks Archive</h2>
      <div class="archive-list">
        <div class="week-item">
        <div class="week-copy">
          <strong>Week 14</strong>
          <span>已发布晚餐和训练</span>
        </div>
        <div class="week-links">
          <a class="button green" href="./weeks/week14/dinner.html">Dinner</a>
          <a class="button indigo" href="./weeks/week14/training.html">Training</a>
        </div>
      </div>
      </div>
    </section>
  </div>
</body>
</html>
