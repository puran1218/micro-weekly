  { name: "蒸水蛋", cat: "蛋", method: "蒸", tags: [["tag-egg","蛋"],["tag-easy","简单"],["tag-safe","不糊锅"],["tag-kid","儿童友好"]], desc: "蛋液加 1.5 倍温水过筛，盖保鲜膜蒸 10 分钟", safety: "蒸制，不糊锅" },

  { name: "紫菜虾皮汤", cat: "汤", method: "煮", tags: [["tag-soup","汤"],["tag-easy","简单"],["tag-safe","不糊锅"],["tag-kid","儿童友好"]], desc: "开水冲紫菜虾皮，加盐葱花香油", safety: "冲泡即成，5 分钟" },

  { name: "土豆炖鸡块", cat: "鸡", method: "炖", tags: [["tag-meat","荤"],["tag-easy","简单"],["tag-safe","不糊锅"],["tag-kid","儿童友好"]], desc: "鸡块焯水，加土豆姜片生抽加水炖 30 分钟", safety: "水多炖制，不用收汁收太干" },

let currentDish = null;

function renderPool() {
  const grid = document.getElementById('pool-grid');
  grid.innerHTML = pool.map(d => `<div class="pool-item"><span class="pool-item-name">${d.name}</span><span class="pool-item-cat">${d.cat}</span></div>`).join('');
}

function pickRandom(filter) {
  const candidates = filter ? pool.filter(filter) : pool;
  const pool2 = currentDish ? candidates.filter(d => d.name !== currentDish.name) : candidates;
  const source = pool2.length > 0 ? pool2 : candidates;
  const picked = source[Math.floor(Math.random() * source.length)];
  currentDish = picked;
  showDish(picked);
}

function showDish(d) {
  document.getElementById('empty-hint').style.display = 'none';
  const card = document.getElementById('dish-card');
  card.style.display = 'block';
  document.getElementById('dish-title').textContent = d.name;
  document.getElementById('dish-tags').innerHTML = d.tags.map(t => `<span class="tag ${t[0]}">${t[1]}</span>`).join('');
  document.getElementById('dish-desc').textContent = d.desc;
  const note = document.getElementById('safety-note');
  if (d.safety) {
    note.textContent = '安全提示：' + d.safety;
    note.style.display = 'inline-block';
  } else {
    note.style.display = 'none';
  }
  document.getElementById('btn-video').style.display = 'inline-block';
}

function openVideo() {
  if (currentDish) {
    const query = encodeURIComponent(currentDish.name + ' 做法 家常菜');
    openLink('https://www.youtube.com/results?search_query=' + query);
  }
}

const isMeat = d => ["鱼","虾","鸡","排骨","猪肉","牛肉"].includes(d.cat);
const isVeg = d => d.cat === "蔬菜";

document.getElementById('btn-pick').addEventListener('click', () => pickRandom(null));
document.getElementById('btn-pick-meat').addEventListener('click', () => pickRandom(isMeat));
document.getElementById('btn-pick-veg').addEventListener('click', () => pickRandom(isVeg));

renderPool();
</script>
